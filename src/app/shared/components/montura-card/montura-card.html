<mat-card style="border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height: 100%; display: flex; flex-direction: column;">
  
  @if (montura.imagen_url) {
    <div style="height: 200px; width: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #eee;">
      <img [src]="montura.imagen_url" 
           alt="Foto de {{ montura.marca }}"
           style="max-height: 100%; max-width: 100%; object-fit: contain; padding: 1.5rem; box-sizing: border-box;">
    </div>
  } @else {
    <div style="height: 200px; background: #f5f5f5; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #eee; color: #9e9e9e;">
      <mat-icon style="font-size: 3rem; width: 3rem; height: 3rem;">image_not_supported</mat-icon>
      <span style="font-size: 0.9rem; margin-top: 8px;">Sin foto disponible</span>
    </div>
  
  }
       
  <mat-card-content style="padding: 1.5rem; text-align: center; flex-grow: 1;">
    <h3 style="margin: 0; font-size: 1.2rem; color: #333; font-weight: bold;">{{ montura.marca }}</h3>
    <p style="margin: 5px 0 15px; color: #666;">{{ montura.modelo }}</p>
    
    <span style="background: #e0e0e0; color: #555; padding: 4px 12px; border-radius: 16px; font-size: 0.85rem;">
      {{ montura.material }}
    </span>
    
    <h2 style="color: #1976d2; font-size: 1.8rem; margin: 15px 0 5px; font-weight: bold;">S/ {{ montura.precio }}</h2>
    
    @if (montura.stock === 0) {
      <p style="color: #d32f2f; font-weight: bold; margin: 0; display: flex; justify-content: center; align-items: center;">
        <mat-icon style="font-size: 1.2rem; width: 1.2rem; height: 1.2rem; margin-right: 4px;">error</mat-icon>
        AGOTADO
      </p>
    } @else {
      <p style="color: #4caf50; font-weight: 500; margin: 0; display: flex; justify-content: center; align-items: center;">
        <mat-icon style="font-size: 1.2rem; width: 1.2rem; height: 1.2rem; margin-right: 4px;">check_circle</mat-icon>
        Stock: {{ montura.stock }} unds.
      </p>
    }
  </mat-card-content>
  
  <div style="padding: 0 1.5rem 1.5rem;">
    <button mat-raised-button 
            [color]="montura.stock === 0 ? '' : 'primary'" 
            [disabled]="montura.stock === 0"
            style="width: 100%; border-radius: 8px; font-weight: bold;"
            (click)="seleccionar.emit(montura.id)">
      Ver Detalles
    </button>
  </div>
</mat-card>
