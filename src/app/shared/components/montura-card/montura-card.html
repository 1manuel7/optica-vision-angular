<mat-card style="margin-bottom: 1rem; transition: box-shadow 0.3s; border-radius: 12px;">
  <mat-card-header>
    <div mat-card-avatar style="font-size: 2.5rem; display: flex; align-items: center; justify-content: center;">
      {{ montura.imagen }}
    </div>
    <mat-card-title style="font-size: 1.3rem;">{{ montura.marca }}</mat-card-title>
    <mat-card-subtitle>{{ montura.modelo }}</mat-card-subtitle>
  </mat-card-header>
  
  <mat-card-content style="padding-top: 1rem; text-align: center;">
    <span style="background: #e0e0e0; padding: 4px 12px; border-radius: 16px; font-size: 0.85rem; color: #424242;">
      {{ montura.material }}
    </span>
    <p style="font-size: 2rem; font-weight: 500; color: #1976d2; margin: 1.5rem 0 0.5rem 0;">
      S/ {{ montura.precio }}
    </p>

    @if (montura.stock > 0) {
      <p style="color: #2e7d32; font-weight: 500; margin: 0; font-size: 0.9rem;">🟢 Stock: {{ montura.stock }} unds.</p>
    } @else {
      <p style="color: #d32f2f; font-weight: bold; margin: 0; font-size: 0.9rem;">🔴 AGOTADO</p>
    }
  </mat-card-content>
  
  <mat-card-actions>
    <button mat-flat-button color="primary" [disabled]="montura.stock === 0" (click)="onVerDetalle()" style="width: 100%; border-radius: 8px;">
      Ver Detalles
    </button>
  </mat-card-actions>
