@if (authService.user$ | async) {
  <div class="layout-container">
    
    <aside class="sidebar">
      
      <div class="sidebar-logo">
        <div class="logo-icon">
          <mat-icon style="color: white;">visibility</mat-icon>
        </div>
        <h1 style="margin: 0; font-size: 1.3rem; font-weight: 800; color: white;">
          Óptica<span style="color: #0ea5e9;">Visión</span>
        </h1>
      </div>

      <nav class="sidebar-nav">
        
        <p class="nav-section">PRINCIPAL</p>
        <a routerLink="/dashboard" routerLinkActive="active-link" class="nav-item">
          <mat-icon>dashboard</mat-icon> Dashboard
        </a>

        <p class="nav-section">CLÍNICA</p>
        <a routerLink="/directorio" routerLinkActive="active-link" class="nav-item">
          <mat-icon>people</mat-icon> Pacientes
        </a>
        <a routerLink="/nuevo-paciente" routerLinkActive="active-link" class="nav-item">
          <mat-icon>person_add</mat-icon> Nuevo Paciente
        </a>
        <a routerLink="/agenda" routerLinkActive="active-link" class="nav-item">
          <mat-icon>event_note</mat-icon> Agenda
        </a>

        <p class="nav-section">TIENDA & LAB</p>
        <a routerLink="/catalogo" routerLinkActive="active-link" class="nav-item">
          <mat-icon>inventory_2</mat-icon> Catálogo
        </a>
        <a routerLink="/pedidos" routerLinkActive="active-link" class="nav-item">
          <mat-icon>local_shipping</mat-icon> Pedidos
        </a>
      </nav>

      <div class="sidebar-footer">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div class="user-avatar">AD</div>
          <div>
            <p style="margin: 0; font-size: 0.9rem; font-weight: bold; color: white;">Administrador</p>
            <p style="margin: 0; font-size: 0.75rem; color: #94a3b8;">En línea</p>
          </div>
        </div>
        <button mat-icon-button (click)="cerrarSesion()" style="color: #ef4444;" title="Cerrar Sesión">
          <mat-icon>logout</mat-icon>
        </button>
      </div>

    </aside>

    <div class="main-area">
      
      <header class="topbar">
        <div style="display: flex; align-items: center; gap: 15px; color: #cbd5e1;">
          <mat-icon>menu</mat-icon>
          <span style="font-weight: 500; font-size: 1.1rem;">Panel de Control</span>
        </div>
        
        <div style="display: flex; align-items: center; gap: 10px;">
          <button mat-icon-button (click)="themeService.toggleDarkMode()" style="color: #cbd5e1;" title="Modo Claro/Oscuro">
            @if (themeService.isDarkMode$ | async) {
              <mat-icon style="color: #fbbf24;">light_mode</mat-icon> 
            } @else {
              <mat-icon style="color: #cbd5e1;">dark_mode</mat-icon> 
            }
          </button>
        </div>
      </header>

      <main class="content-area">
        <router-outlet></router-outlet>
      </main>

    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}
