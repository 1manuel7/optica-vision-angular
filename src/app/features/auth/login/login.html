<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; background-color: #f8f9fa;">
  
  <mat-card style="width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
    
    <mat-card-header style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem;">
      <mat-card-title style="font-size: 2rem; color: #1976d2; font-weight: bold; margin-bottom: 0.5rem;">Óptica Visión</mat-card-title>
      <mat-card-subtitle style="font-size: 1.1rem;">Acceso Restringido al Sistema</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content style="display: flex; flex-direction: column; gap: 1rem;">
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Usuario (Credencial)</mat-label>
        <input matInput type="text" [(ngModel)]="usuario" placeholder="Ingresa 'admin'">
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Contraseña de acceso</mat-label>
        <input matInput type="password" [(ngModel)]="contrasena" placeholder="Ingresa '1234'">
      </mat-form-field>

      @if (mensajeError) {
        <div style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; text-align: center; font-size: 0.9rem; font-weight: 500;">
          ⚠️ Credenciales incorrectas. Intenta de nuevo.
        </div>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary" (click)="iniciarSesion()" style="width: 100%; height: 50px; font-size: 1.1rem; border-radius: 8px; margin-top: 1rem;">
        Iniciar Sesión
      </button>
    </mat-card-actions>

  </mat-card>

</div>
