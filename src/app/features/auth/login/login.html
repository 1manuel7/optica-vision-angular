<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f5f5f5;">
  
  <mat-card style="width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <mat-icon style="font-size: 4rem; width: 4rem; height: 4rem; color: #1976d2;">visibility</mat-icon>
      <h2 style="color: #333; margin: 1rem 0 0.5rem; font-size: 1.8rem; font-weight: bold;">Óptica Visión</h2>
      <p style="color: #666; margin: 0;">Sistema de Gestión Integrado</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" style="display: flex; flex-direction: column; gap: 1.5rem;">

      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Correo Electrónico</mat-label>
        <input matInput formControlName="email" type="email" placeholder="admin@opticavision.com">
        <mat-icon matPrefix style="margin-right: 10px; color: #757575;">email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Contraseña</mat-label>
        <input matInput formControlName="password" type="password" placeholder="********">
        <mat-icon matPrefix style="margin-right: 10px; color: #757575;">lock</mat-icon>
      </mat-form-field>

      @if (errorMensaje) {
        <div style="color: #d32f2f; background-color: #ffebee; padding: 10px; border-radius: 4px; text-align: center; font-size: 0.9rem;">
          <mat-icon style="vertical-align: middle; font-size: 1.2rem; width: 1.2rem; height: 1.2rem;">error</mat-icon>
          {{ errorMensaje }}
        </div>
      }

      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || cargando" style="padding: 1.5rem 0; font-size: 1.1rem; border-radius: 8px; margin-top: 0.5rem;">
        {{ cargando ? 'Verificando credenciales...' : 'Ingresar al Sistema' }}
      </button>

    </form>
  </mat-card>
  
</div>
