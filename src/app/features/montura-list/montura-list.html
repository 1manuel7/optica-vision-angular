<div style="color: #f8fafc;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2 style="margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px;">
      Catálogo de Monturas
    </h2>
    
    <button mat-raised-button style="background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; height: 45px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);" (click)="irANuevaMontura()">
      <mat-icon style="margin-right: 5px;">add_circle</mat-icon>
      Agregar Montura
    </button>
  </div>

  <div style="margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center;">
    
    <mat-form-field appearance="outline" style="flex: 1; max-width: 400px;">
      <mat-label style="color: #94a3b8;">Filtrar por material</mat-label>
      <input matInput type="text" [(ngModel)]="filtroMaterial" placeholder="Ej. Metal, Acetato, Titanio..." style="color: #e2e8f0;">
      <mat-icon matSuffix style="color: #64748b;">search</mat-icon>
    </mat-form-field>

    <button mat-flat-button style="background-color: #1e293b; border: 1px solid #334155; color: #0ea5e9; height: 50px; border-radius: 8px; margin-bottom: 22px; font-weight: bold;" (click)="buscar()">
      <mat-icon>filter_list</mat-icon> Filtrar
    </button>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
    @for (item of monturas; track item.id) {
      
      <app-montura-card
        [montura]="item"
        (seleccionar)="irAlDetalle($event)">
      </app-montura-card>

    } @empty {
      <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; background: #1e293b; border-radius: 12px; border: 1px dashed #334155;">
        <mat-icon style="font-size: 3.5rem; height: 3.5rem; width: 3.5rem; color: #475569; margin-bottom: 1rem;">search_off</mat-icon>
        <p style="font-size: 1.2rem; color: #94a3b8; margin: 0;">No se encontraron monturas con la palabra "{{ filtroMaterial }}".</p>
      </div>
    }
  </div>
</div>
