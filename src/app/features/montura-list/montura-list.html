<div>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
    <h2 style="margin: 0; font-family: Roboto, sans-serif;">Catálogo de Monturas en Stock</h2>
    
    <button mat-raised-button color="accent" (click)="irANuevaMontura()" style="height: 50px; border-radius: 8px; font-weight: bold;">
      <mat-icon style="margin-right: 8px;">add_circle</mat-icon>
      Agregar Montura
    </button>
  </div>

  <div style="margin-bottom: 2rem; display: flex; gap: 1rem; align-items: center;">
    
    <mat-form-field appearance="outline" style="flex: 1; max-width: 400px;">
      <mat-label>Filtrar por material</mat-label>
      <input matInput type="text" [(ngModel)]="filtroMaterial" placeholder="Ej. Metal, Acetato, Titanio...">
      <mat-icon matSuffix style="color: #666;">search</mat-icon>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="buscar()" style="height: 50px; border-radius: 8px; margin-bottom: 22px;">
      Filtrar Catálogo
    </button>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
    @for (item of monturas; track item.id) {
      
      <app-montura-card
        [montura]="item"
        (seleccionar)="irAlDetalle($event)">
      </app-montura-card>

    } @empty {
      <div style="grid-column: 1 / -1; text-align: center; padding: 2rem; background: #f5f5f5; border-radius: 8px; border: 1px dashed #ccc;">
        <mat-icon style="font-size: 3rem; height: 3rem; width: 3rem; color: #9e9e9e;">search_off</mat-icon>
        <p style="font-size: 1.2rem; color: #616161; margin-top: 1rem;">No se encontraron monturas con la palabra "{{ filtroMaterial }}".</p>
      </div>
    }
  </div>
</div>
